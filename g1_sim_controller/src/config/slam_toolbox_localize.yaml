# ─── slam_toolbox — Unitree G1 (localization mode) ───────────────────────────
#
# Frame convention:
#   odom -> base_link  (published by odom_to_tf, clock-offset corrected)
#   base_link -> ... -> livox_frame  (full chain published by the robot)
#
# slam_toolbox publishes: map -> odom

slam_toolbox:
  ros__parameters:

    # ── Frames ───────────────────────────────────────────────────────────────
    odom_frame:  odom
    map_frame:   map
    base_frame:  base_link
    scan_topic:  /scan

    # ── Mode ─────────────────────────────────────────────────────────────────
    mode: localization

    # ── Solver ───────────────────────────────────────────────────────────────
    solver_plugin:              solver_plugins::CeresSolver
    ceres_linear_solver:        SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner:       SCHUR_JACOBI
    ceres_trust_strategy:       LEVENBERG_MARQUARDT
    ceres_dogleg_type:          TRADITIONAL_DOGLEG
    ceres_loss_function:        None
    ceres_solver_threads:       8

    # ── Scan Matcher ─────────────────────────────────────────────────────────
    use_scan_matching:                   true
    use_scan_barycenter:                 true
    # Reduced buffer — localization doesn't need as much history as mapping
    scan_buffer_size:                    10
    scan_buffer_maximum_scan_distance:   10.0
    link_match_minimum_response_fine:    0.1
    # Tighter max distance — prevents matching against far-away scans
    link_scan_maximum_distance:          1.5
    loop_search_maximum_distance:        3.0
    do_loop_closing:                     false
    loop_match_minimum_chain_size:       10
    loop_match_maximum_variance_coarse:  3.0
    loop_match_minimum_response_coarse:  0.35
    loop_match_minimum_response_fine:    0.45

    # ── Correlation Search Space ─────────────────────────────────────────────
    # Controls how far (in meters) the scan matcher searches around the
    # odometry-predicted pose. Smaller = less jumping but needs decent odom.
    correlation_search_space_dimension:   0.5
    correlation_search_space_resolution:  0.01
    correlation_search_space_smear_deviation: 0.1

    # ── Loop Closure Search Space ────────────────────────────────────────────
    loop_search_space_dimension:          8.0
    loop_search_space_resolution:         0.05
    loop_search_space_smear_deviation:    0.03

    # ── Scan Matcher Penalties ───────────────────────────────────────────────
    # Higher penalties = trust odometry more, less jumping.
    # Previous values (0.3 / 0.5) were too permissive and let the matcher
    # override odometry with poor scan matches.
    distance_variance_penalty:   0.5
    angle_variance_penalty:      1.0
    fine_search_angle_offset:    0.00349
    # 0.349 rad (~20 deg) — enough to correct yaw drift without violent jumps.
    # Previous 0.785 (45 deg) was far too wide for localization.
    coarse_search_angle_offset:  0.349
    coarse_angle_resolution:     0.0349
    minimum_angle_penalty:       0.9
    minimum_distance_penalty:    0.5
    use_response_expansion:      true

    # ── Map ──────────────────────────────────────────────────────────────────
    resolution:           0.05
    map_update_interval:  5.0
    max_laser_range:     20.0

    # ── Misc ─────────────────────────────────────────────────────────────────
    # Require more motion before triggering a scan match update.
    # Previous 0.1m / 0.175rad triggered on noise, causing micro-jumps.
    minimum_time_interval:     0.5
    minimum_travel_distance:   0.5
    minimum_travel_heading:    0.5
    transform_publish_period:  0.02
    transform_timeout:         0.5
    tf_buffer_duration:       30.0
    stack_size_to_use:        40000000
    enable_interactive_mode:  true

    # ── Serialization ────────────────────────────────────────────────────────
    # Path to the saved map (without extension).
    # slam_toolbox expects a .posegraph file saved via serialize_map service,
    # NOT the .pgm/.yaml saved by map_saver_cli.
    # To save: ros2 service call /slam_toolbox/serialize_map \
    #            slam_toolbox/srv/SerializePoseGraph \
    #            "{filename: '/home/unitree/maps/map_robotspace'}"
    use_map_saver:       false
    map_file_name:       /ros_ws/maps/rs_map
    map_start_pose:      [0.0, 0.0, 0.0]
    map_start_at_dock:   false
    debug_logging:       false
    # Process every scan for better localization accuracy
    throttle_scans:      3