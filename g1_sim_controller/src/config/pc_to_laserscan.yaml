# ─── pointcloud_to_laserscan — Unitree G1 (simulation) ──────────────────────
#
# Pointcloud arrives in base_link frame (pre-transformed by sim_main.py).
# No TF lookup needed — target_frame matches the incoming frame_id.
#
# base_link (imu_in_torso) is ~0.8m above ground.
# Ground in base_link frame is at z ≈ -0.8m.

pc_to_ls:
  ros__parameters:
    target_frame: base_link
    transform_tolerance: 0.5

    # Ground is at ~-0.8m in base_link frame.
    # -0.50 = ~0.3m above ground — captures low obstacles/boxes.
    #  0.80 = ~1.6m above ground — captures tall obstacles/walls.
    min_height: -0.50
    max_height:  0.80

    angle_min:        -3.1415
    angle_max:         3.1415
    angle_increment:   0.0087   # ~0.5 deg
    scan_time:         0.1      # 10 Hz
    range_min:         0.3
    range_max:        20.0

    use_inf:     true
    inf_epsilon: 1.0
